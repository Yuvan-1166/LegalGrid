services:
  # Backend API Service
  - type: web
    name: legalgrid-backend
    runtime: python
    region: oregon
    plan: starter
    branch: main
    rootDir: backend
    buildCommand: pip install uv && uv sync --frozen
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ENVIRONMENT
        value: production
      - key: GROQ_API_KEY
        sync: false  # Set this in Render dashboard
      - key: QDRANT_URL
        fromService:
          type: pserv
          name: legalgrid-qdrant
          property: hostport
    healthCheckPath: /health
    autoDeploy: true

  # Qdrant Vector Database (Private Service)
  - type: pserv
    name: legalgrid-qdrant
    runtime: docker
    region: oregon
    plan: starter
    branch: main
    dockerfilePath: ./backend/Dockerfile.qdrant
    envVars:
      - key: QDRANT__SERVICE__GRPC_PORT
        value: 6334
    disk:
      name: qdrant-storage
      mountPath: /qdrant/storage
      sizeGB: 10
